<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wチャンスキャンペーン</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    width:90%;
    max-width:400px;
    background:#1f1f1f;
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 0 20px gold;
}

h1{
    color:gold;
}

input{
    width:90%;
    padding:12px;
    font-size:18px;
    border-radius:10px;
    border:none;
    margin-top:20px;
}

button{
    margin-top:20px;
    width:100%;
    padding:15px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:gold;
    color:black;
    font-weight:bold;
}

#loading{
    display:none;
    margin-top:20px;
}

#result{
    display:none;
    margin-top:30px;
    font-size:24px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="box">

<h1>🎫 Wチャンスキャンペーン</h1>

<p>シリアルコードを入力してください</p>

<input id="code" placeholder="例：Y20261104N" autocomplete="off">

<button onclick="checkCode()">抽選する</button>

<div id="loading">
    <h2>抽選中...</h2>
</div>

<div id="result"></div>

</div>

<script>

function checkCode(){

const code=document.getElementById("code").value.trim().toUpperCase();

document.getElementById("loading").style.display="block";
document.getElementById("result").style.display="none";

setTimeout(function(){

document.getElementById("loading").style.display="none";

if(code==="Y20261104N"){

document.getElementById("result").innerHTML=
`
<img src="IMG_0712.jpeg"
style="width:100%;
max-width:350px;
border-radius:20px;
box-shadow:0 0 25px gold;">
`;

}else if(code==="N20261104Y"){

document.getElementById("result").innerHTML=
`
<img src="IMG_0712.jpeg"
style="width:100%;max-width:350px;border-radius:20px;box-shadow:0 0 25px gold;">

<br><br>

<span style="color:gold;font-size:28px;font-weight:bold;text-shadow:0 0 15px gold;">
✨🌟Wチャンスキャンペーン🌟✨
</span>

<br><br>

<span style="color:#ffd700;font-size:32px;font-weight:bold;text-shadow:0 0 15px gold;">
🎁✨あたり✨🎁
</span>

<br><br>

<span style="font-size:22px;line-height:1.8;">
おめでとう！<br>
ななちゃんに見せて<br>
プレゼントと引き換えてもらってね💕
</span>
`;

}else if(code==="N20261104A"){

document.getElementById("result").innerHTML=
`
<img src="IMG_A.jpeg"
style="width:100%;max-width:350px;border-radius:20px;">
`;

}else if(code==="N20261104B"){

document.getElementById("result").innerHTML=
`
<img src="IMG_B.jpeg"
style="width:100%;max-width:350px;border-radius:20px;">
`;

}else if(code==="N20261104C"){

document.getElementById("result").innerHTML=
`
<img src="IMG_0712.jpeg"
style="width:100%;max-width:350px;border-radius:20px;box-shadow:0 0 25px gold;">

<h2 style="color:gold;margin-top:20px;">
🎉 おめでとうございます！ 🎉
</h2>

<p style="font-size:20px;">
Wチャンスキャンペーンに<br>
ご当選されました！
</p>
`;

}else if(code==="N20261104D"){

document.getElementById("result").innerHTML=
`
<img src="IMG_D.webp"
style="width:100%;max-width:350px;border-radius:20px;">
`;
}else{

document.getElementById("result").innerHTML=
`
<img src="IMG_0712.jpeg"
style="width:100%;
max-width:350px;
border-radius:20px;
box-shadow:0 0 25px gold;">

<br><br>

<span style="color:gold;font-size:28px;font-weight:bold;text-shadow:0 0 15px gold;">
✨🌟Wチャンスキャンペーン🌟✨
</span>

<br><br>

<span style="color:#aaa;font-size:32px;font-weight:bold;">
😢はずれ…😢
</span>

<br><br>

<span style="font-size:22px;line-height:1.8;">
残念…！<br>
今回は当選しませんでした💦<br>
また挑戦してね💕
</span>
`;

}

document.getElementById("result").style.display="block";

},3000);

}

</script>

</body>
</html>
